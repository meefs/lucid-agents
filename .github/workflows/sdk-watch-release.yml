name: SDK Schema Watch

on:
  repository_dispatch:
    types: [api-spec-updated]
  workflow_dispatch:
    inputs:
      openapi_url:
        description: 'Authorized OpenAPI schema URL'
        required: false
        type: string

concurrency:
  group: sdk-schema-review
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-and-open-pr:
    name: Regenerate SDK review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout current master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate SDK with schema provenance
        working-directory: packages/api-sdk
        env:
          OPENAPI_URL: ${{ inputs.openapi_url || github.event.client_payload.openapi_url || 'https://api-lucid-dev.daydreams.systems/doc' }}
        run: bun run generate -- --result "$RUNNER_TEMP/sdk-generation-result.json"

      - name: Read compatibility result
        id: generation
        env:
          RESULT_PATH: ${{ runner.temp }}/sdk-generation-result.json
        run: |
          node <<'EOF'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync(process.env.RESULT_PATH, 'utf8'));
          for (const key of ['classification', 'schemaSha256', 'schemaSource']) {
            const value = String(result[key] ?? '');
            if (!value || value.includes('\n')) throw new Error(`Invalid generation result ${key}`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);
          }
          const bump = result.recommendedBump == null ? 'none' : String(result.recommendedBump);
          if (!['none', 'patch', 'minor'].includes(bump)) {
            throw new Error(`Invalid recommended bump ${bump}`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `recommended_bump=${bump}\n`);
          EOF

      - name: Verify generated SDK and classifier
        working-directory: packages/api-sdk
        run: |
          bun run test:compatibility
          bun run type-check
          bun run build

      - name: Check for SDK changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- packages/api-sdk/src/sdk packages/api-sdk/src/openapi-provenance.gen.ts packages/api-sdk/openapi-schema.json packages/api-sdk/openapi-provenance.json)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create compatibility-aware changeset
        if: steps.changes.outputs.has_changes == 'true' && steps.generation.outputs.recommended_bump != 'none'
        env:
          SDK_BUMP: ${{ steps.generation.outputs.recommended_bump }}
          SDK_CLASSIFICATION: ${{ steps.generation.outputs.classification }}
          SDK_SCHEMA_SHA256: ${{ steps.generation.outputs.schemaSha256 }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const bump = process.env.SDK_BUMP;
          if (!['patch', 'minor'].includes(bump)) {
            throw new Error(`Refusing automatic changeset for ${bump}`);
          }
          const contents = [
            '---',
            `"@lucid-agents/api-sdk": ${bump}`,
            '---',
            '',
            `Regenerate the hosted Runtime API client from schema ${process.env.SDK_SCHEMA_SHA256} (${process.env.SDK_CLASSIFICATION}).`,
            '',
          ].join('\n');
          fs.writeFileSync('.changeset/api-sdk-schema-update.md', contents);
          EOF

      - name: Open or update SDK review pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/api-sdk-schema
          base: master
          delete-branch: true
          commit-message: 'chore(api-sdk): regenerate from reviewed schema'
          title: 'chore(api-sdk): review generated schema update'
          body: |
            Automated SDK regeneration for review.

            - Schema source: `${{ steps.generation.outputs.schemaSource }}`
            - SHA-256: `${{ steps.generation.outputs.schemaSha256 }}`
            - Compatibility: `${{ steps.generation.outputs.classification }}`
            - Automatic version bump: `${{ steps.generation.outputs.recommended_bump }}`

            Breaking, ambiguous, and first-baseline changes intentionally have no automatic changeset. A reviewer must inspect the provenance report and generated diff, then add the appropriate changeset before merge.
          add-paths: |
            packages/api-sdk/src/sdk
            packages/api-sdk/src/openapi-provenance.gen.ts
            packages/api-sdk/openapi-schema.json
            packages/api-sdk/openapi-provenance.json
            .changeset

      - name: No changes detected
        if: steps.changes.outputs.has_changes != 'true'
        run: |
          echo "::notice title=No Changes::SDK and committed schema provenance already match the authorized specification."
