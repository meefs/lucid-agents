name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Ephemerally version, build, and pack pending changesets without publishing'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-master
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  release:
    name: Publish committed package versions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout current master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Record source commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Verify exact master CI attestation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SOURCE_SHA: ${{ steps.source.outputs.sha }}
          RELEASE_TRIGGER_REF: ${{ github.ref }}
        run: bun run scripts/release-policy.ts verify

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate release plan
        run: |
          PLAN_RELATIVE_PATH=".git/lucid-release-plan.json"
          PLAN_PATH="$GITHUB_WORKSPACE/$PLAN_RELATIVE_PATH"
          NOTES_PATH="$RUNNER_TEMP/release-notes.md"
          bun run changeset status --output "$PLAN_RELATIVE_PATH"
          bun run scripts/release-plan.ts "$PLAN_PATH" "$NOTES_PATH"
          echo "RELEASE_PLAN_PATH=$PLAN_PATH" >> "$GITHUB_ENV"

      - name: Enforce committed live-release boundary
        id: mode
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          PLAN_PATH: ${{ env.RELEASE_PLAN_PATH }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const plan = JSON.parse(fs.readFileSync(process.env.PLAN_PATH, 'utf8'));
          const releases = Array.isArray(plan.releases) ? plan.releases : [];
          const dryRun = process.env.DRY_RUN === 'true';

          if (!dryRun && releases.length > 0) {
            throw new Error(
              'Live publishing cannot apply pending changesets. Merge the Version Packages PR, wait for CI on that committed version bump, then run this workflow again.'
            );
          }

          const shouldRun = dryRun ? releases.length > 0 : true;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=${shouldRun}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_pending=${releases.length > 0}\n`);
          EOF

      - name: Verify npm token
        if: steps.mode.outputs.should_run == 'true' && inputs.dry_run != true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is required to publish packages."
            exit 1
          fi

      - name: Configure npm auth
        if: steps.mode.outputs.should_run == 'true' && inputs.dry_run != true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      - name: Preflight npm publish access
        if: steps.mode.outputs.should_run == 'true' && inputs.dry_run != true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run scripts/changeset-publish.ts --preflight-only

      - name: Ephemerally bump versions for dry run
        if: steps.mode.outputs.should_run == 'true' && inputs.dry_run == true
        run: bun run release:version

      - name: Build and inspect every publishable artifact
        if: steps.mode.outputs.should_run == 'true'
        run: |
          bun run build:packages
          bun run scripts/changeset-publish.ts --dry-run

      - name: Confirm verified master has not advanced
        if: steps.mode.outputs.should_run == 'true' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run scripts/release-policy.ts verify-master

      - name: Publish committed package versions
        if: steps.mode.outputs.should_run == 'true' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release:publish:verified

      - name: Finish dry run
        if: steps.mode.outputs.should_run == 'true' && inputs.dry_run == true
        run: |
          echo "::notice title=Dry Run::Pending changesets were versioned only in the ephemeral checkout; all packages built and npm pack inspected every publishable artifact. Nothing was published."

      - name: No dry-run release required
        if: steps.mode.outputs.should_run != 'true' && inputs.dry_run == true
        run: echo "::notice title=Dry Run::No pending changesets found."

      - name: Finish live publish
        if: steps.mode.outputs.should_run == 'true' && inputs.dry_run != true
        run: |
          echo "::notice title=Release::Published only package versions already committed on the CI-verified master commit."
